{% extends "base.html" %}

{% block title %}Iniciar Sesión - Admin Chocolates Patitas de Algodón{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-salmon-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-100">
        <div>
            <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-gray-100">
                <svg class="h-10 w-10 text-salmon-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-darkgray font-serif">
                Panel de Administración
            </h2>
            <p class="mt-2 text-center text-sm text-salmon-600">
                Chocolates Patitas de Algodón
            </p>
        </div>

        <form class="mt-8 space-y-6" action="{{ url_for('admin.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email" class="sr-only">Correo Electrónico</label>
                    <input id="email" name="email" type="email" autocomplete="email" required
                        class="appearance-none relative block w-full px-3 py-3 border border-gray-200 placeholder-gray-400 text-darkgray rounded focus:outline-none focus:ring-salmon-400 focus:border-salmon-400 focus:z-10 sm:text-sm"
                        placeholder="Correo electrónico">
                </div>
                <div>
                    <label for="password" class="sr-only">Contraseña</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="appearance-none relative block w-full px-3 py-3 border border-gray-200 placeholder-gray-400 text-darkgray rounded focus:outline-none focus:ring-salmon-400 focus:border-salmon-400 focus:z-10 sm:text-sm"
                        placeholder="Contraseña">
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-salmon-400 hover:bg-salmon-500 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-salmon-400 transition-all duration-200 ease-in-out">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <svg class="h-5 w-5 text-salmon-300 group-hover:text-salmon-200"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                            aria-hidden="true">
                            <path fill-rule="evenodd"
                                d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z"
                                clip-rule="evenodd" />
                        </svg>
                    </span>
                    Iniciar Sesión
                </button>
            </div>
            <div class="text-center">
                <a href="/"
                    class="text-sm font-medium text-gray-500 hover:text-darkgray transition-colors">Volver a
                    la tienda</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
